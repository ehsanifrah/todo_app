
services:
  db:
    image: mysql:8.0
    container_name: todo_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret_password
      MYSQL_DATABASE: todo_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Mounts the initialization script into the container initialization path
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: todo_backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=secret_password
      - DB_NAME=todo_db
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: todo_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data: